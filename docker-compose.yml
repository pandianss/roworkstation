services:
  ro-workstation:
    build:
      context: .
    image: ro-workstation-app:latest
    container_name: ro-workstation
    restart: unless-stopped
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      RO_ENVIRONMENT: production
      RO_OFFLINE_MODE: "true"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./files/generated:/app/files/generated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
