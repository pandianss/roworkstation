services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: ro-workstation-backend:latest
    container_name: ro-workstation-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      RO_ENVIRONMENT: production
      RO_OFFLINE_MODE: "true"
    volumes:
      - ./data:/app/data
      - ./backups:/app/backups
      - ./files/generated:/app/files/generated
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: ro-workstation-frontend:latest
    container_name: ro-workstation-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL: http://backend:8000
    depends_on:
      - backend
