# ------------------------------------------------------------------------------
# PARAMETER DEFINITIONS
# ------------------------------------------------------------------------------
# mis_col: The exact column name in the enriched MIS dataframe (Uppercase)
# budget_code: The code used in the 'PARAMETER' column of budget Excel files
# display_name: Human-readable name for reports and letters
# category: Business segment (DEPOSITS, RETAIL, AGRI, MSME, etc.)
# report_group: Logical group for letter generation (CASA, TD, MSME, etc.)
# is_parent: If true, this represents a group total (e.g., CASA = SB + CD)
# subsets: List of IDs that are part of this parent (for breakdown tables)
# ------------------------------------------------------------------------------

parameters:
  # --- DEPOSITS ---
  - id: casa
    mis_col: "CASA"
    budget_code: "CASA"
    display_name: "CASA"
    category: "DEPOSITS"
    report_group: "CASA"
    is_parent: true
    subsets: ["sb", "cd"]

  - id: sb
    mis_col: "SB"
    budget_code: "SB"
    display_name: "SB"
    category: "DEPOSITS"
    parent_id: casa

  - id: cd
    mis_col: "CD"
    budget_code: "CD"
    display_name: "CD"
    category: "DEPOSITS"
    parent_id: casa

  - id: td
    mis_col: "TD"
    budget_code: "TD"
    display_name: "TD"
    category: "DEPOSITS"
    report_group: "TD"
    is_parent: true
    subsets: ["ret_td"]

  - id: ret_td
    mis_col: "RET TD"
    budget_code: "Ret_TD"
    display_name: "RET TD"
    category: "DEPOSITS"
    parent_id: td

  - id: total_deposits
