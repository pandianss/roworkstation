# ------------------------------------------------------------------------------
# NIL SANCTION TRIGGERS
# ------------------------------------------------------------------------------
# Defines products where zero new sanctions in a month triggers an explanation letter.
# Each entry can map to one or more scheme codes or categories.
# ------------------------------------------------------------------------------
nil_sanctions:
  - id: housing
    display_name: "Housing Loans"
    target_categories: ["Housing"] # Matches l2_sector in advances_records
    active: true

  - id: vehicle
    display_name: "Vehicle Loans"
    target_categories: ["Vehicle"]
    active: true
