FI:
  name: "Financial Inclusion"
  kpis:
    - "PMJDY accounts opened"
    - "BC outlet count"
    - "Aadhaar seeding %"
  returns:
    - name: "Monthly PMJDY return"
      frequency: monthly
      due_day: 7
      recipient: HO
      format: excel
      reminder_days: [7, 3, 1]
    - name: "Weekly BC performance return"
      frequency: weekly
      due_day: monday
      reminder_days: [1]
