<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&family=Josefin+Sans:wght@300;400;700;900&family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a; /* Deep Action Blue */
            --gold:    #D4AF37;
            --accent:  #ef4444; /* Alert Red for Urgency */
            --white:   #ffffff;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background:#0f172a;
            display:flex;
            flex-direction:column;
            align-items:center;
            font-family:'Josefin Sans', sans-serif;
        }

        #poster {
            width:1080px;
            height:1920px;
            position:relative;
            overflow:hidden;
            background: var(--primary);
            color: white;
        }

        /* ⚡ Action Background */
        .bg-pattern {
            position:absolute; inset:0;
            background: 
                linear-gradient(135deg, rgba(30,58,138,0.95) 0%, rgba(15,23,42,1) 100%),
                url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            z-index: 1;
        }
        .glow-orb {
            position:absolute; width:1200px; height:1200px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            top:-300px; left:-300px; z-index:2;
        }

        .content {
            position:relative; z-index:10;
            width:100%; height:100%;
            display:flex; flex-direction:column; align-items:center;
            padding:120px 80px;
            text-align: center;
        }

        .logo-wrap { margin-bottom:80px; }
        .logo-wrap img { max-width:400px; filter: brightness(0) invert(1); }

        .mission-tag {
            background: var(--gold);
            color: #000;
            padding: 12px 40px;
            font-weight: 900;
            font-size: 32px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            border-radius: 4px;
            margin-bottom: 40px;
        }

        .campaign-name {
            font-family: 'Montserrat', sans-serif;
            font-size: 140px;
            font-weight: 900;
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -4px;
            background: linear-gradient(to bottom, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 60px;
            text-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .target-box {
            background: rgba(255,255,255,0.05);
            border: 2px solid var(--gold);
            padding: 60px 100px;
            border-radius: 24px;
            margin: 40px 0;
            position: relative;
        }
        .target-label {
            font-size: 36px;
            letter-spacing: 0.2em;
            color: var(--gold);
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .target-value {
            font-size: 120px;
            font-weight: 900;
            color: var(--white);
        }

        .metric-badge {
            display: inline-block;
            margin-top: -30px;
            background: var(--accent);
            padding: 10px 40px;
            border-radius: 100px;
            font-weight: 800;
            font-size: 28px;
            text-transform: uppercase;
        }

        .footer-info {
            position: absolute;
            bottom: 120px;
            width: 100%;
            padding: 0 80px;
        }
        .dates {
            font-size: 32px;
            letter-spacing: 0.1em;
            opacity: 0.8;
            margin-bottom: 40px;
        }
        .region-seal {
            font-family: 'Cinzel', serif;
            font-size: 42px;
            letter-spacing: 0.5em;
            color: var(--gold);
            border-top: 1px solid rgba(212,175,55,0.3);
            padding-top: 30px;
        }

        .btn-dl {
            margin: 40px; padding: 25px 80px;
            background: var(--gold); color: #000;
            border: none; border-radius: 100px;
            font-size: 28px; font-weight: 900;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="poster">
        <div class="bg-pattern"></div>
        <div class="glow-orb"></div>
        
        <div class="content">
            <div class="logo-wrap">
                <img src="{{ logo_url }}" alt="Bank Logo">
            </div>

            <div class="mission-tag">Regional Drive 2026</div>
            <div class="campaign-name">{{ campaign_name }}</div>

            <div class="target-box">
                <div class="target-label">Regional Target</div>
                <div class="target-value">{{ target_value }} Cr</div>
                <div class="metric-badge">{{ metric }}</div>
            </div>

            <div class="footer-info">
                <div class="dates">Drive Period: {{ start_date }} — {{ end_date }}</div>
                <div class="region-seal">Dindigul Region</div>
            </div>
        </div>
    </div>

    <button class="btn-dl" onclick="doExport()">📥 Download Launch Poster</button>

    <script>
        function doExport() {
            const area = document.getElementById('poster');
            const btn = document.querySelector('.btn-dl');
            btn.style.display = 'none';
            html2canvas(area, { scale: 2, backgroundColor: '#0f172a' }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'Drive_{{ campaign_name }}.png';
                link.href = canvas.toDataURL();
                link.click();
                btn.style.display = 'block';
            });
        }
    </script>
</body>
</html>
